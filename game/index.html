<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>萝卜芽科技 · 内置千游 · 防沉迷等级</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            user-select: none;
        }

        body {
            background: #1b2f3c;
            color: #e2f0f0;
            padding: 1rem 1.2rem 3rem;
            min-height: 100vh;
        }

        /* 头部面板 — 等级 / 计时 / 重置 */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            background: rgba(10, 30, 35, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 1rem 2rem;
            border: 1px solid #3b877a;
            box-shadow: 0 8px 26px #041218;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-logo {
            background: #d68c3b;
            width: 48px;
            height: 48px;
            border-radius: 35% 65% 65% 35% / 45% 45% 55% 55%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            transform: rotate(6deg);
            box-shadow: 0 0 22px #eaac6f;
        }
        .brand-name {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(145deg, #c6f0c6, #9ad4c6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1.5px;
        }

        .level-panel {
            background: #1e404b;
            padding: 0.4rem 2rem;
            border-radius: 40px;
            display: flex;
            gap: 1.8rem;
            border: 1px solid #60bcac;
            flex-wrap: wrap;
            align-items: baseline;
        }
        .level-panel div {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .level-label {
            font-size: 1.1rem;
            color: #b2e6da;
        }
        .level-value {
            font-size: 2rem;
            font-weight: 800;
            color: #fad97a;
            line-height: 1;
        }
        .exp-bar {
            background: #0a2b30;
            height: 12px;
            width: 180px;
            border-radius: 30px;
            overflow: hidden;
            margin: 0 10px;
        }
        .exp-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f4b860, #fada5e);
            border-radius: 30px;
        }
        .reset-btn {
            background: #2d5353;
            border: none;
            color: #fee2b5;
            padding: 0.5rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid #70bba5;
            transition: 0.15s;
        }
        .reset-btn:hover {
            background: #467a72;
            color: #fff5d0;
            border-color: #efc476;
            transform: scale(0.98);
        }

        /* 游戏舱 (内置游戏容器) */
        .game-capsule {
            max-width: 1000px;
            margin: 0 auto 2.5rem auto;
            background: #102a30;
            border-radius: 40px;
            padding: 1.2rem;
            border: 2px solid #529a88;
            box-shadow: 0 20px 30px -12px black;
        }
        .game-capsule.minimized {
            display: none;   /* 可以隐藏，但为了简洁我们保留，通过class控制 */
        }
        .game-arena {
            background: #1f4340;
            border-radius: 32px;
            padding: 25px 15px;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border: 2px solid #6ebba5;
            box-shadow: inset 0 0 20px #0e3f3a;
        }

        .game-header {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            color: #e5ffd3;
            padding: 0 10px;
        }
        .game-name-badge {
            background: #0a2e33;
            padding: 8px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.5rem;
            border: 1px solid #9bbf5c;
        }
        .exp-gain {
            background: #29635c;
            padding: 5px 18px;
            border-radius: 60px;
            border: 1px solid #dbb46a;
        }

        .game-play-area {
            font-size: 3rem;
            text-align: center;
            line-height: 1.6;
            background: #1b534b;
            width: 100%;
            border-radius: 60px;
            padding: 25px 0;
            box-shadow: inset 0 -4px 0 #12453e;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .action-btn {
            background: #e19547;
            color: #141f1f;
            font-weight: 700;
            font-size: 1.3rem;
            padding: 12px 40px;
            border: none;
            border-radius: 60px;
            border-bottom: 6px solid #8f5627;
            cursor: pointer;
            transition: 0.1s;
            min-width: 160px;
        }
        .action-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }
        .action-btn.secondary {
            background: #4797a3;
            border-bottom-color: #255c64;
        }

        /* 游戏网格 — 1000 cards */
        .game-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .game-card {
            background: linear-gradient(145deg, #1c3b41, #143036);
            border-radius: 26px 14px 26px 14px;
            border-left: 3px solid #2e9b86;
            border-bottom: 3px solid #2e9b86;
            padding: 16px 6px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: 0.12s;
            cursor: pointer;
            box-shadow: 0 8px 0 #0b262b;
            color: #ecf9f0;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-left-color: #facf7a;
            border-bottom-color: #facf7a;
            background: #22525c;
            box-shadow: 0 12px 12px -6px black;
        }

        .game-emoji {
            font-size: 2.8rem;
            filter: drop-shadow(2px 6px 3px #0c2629);
            margin-bottom: 4px;
        }

        .game-title {
            font-size: 0.88rem;
            font-weight: 600;
            background: #1a414bb3;
            padding: 4px 12px;
            border-radius: 40px;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid #459582;
        }

        .exp-display {
            font-size: 0.75rem;
            background: #10323b;
            padding: 4px 10px;
            border-radius: 20px;
            margin-top: 8px;
            color: #baf0d5;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .exp-display i {
            font-style: normal;
            color: #ffb347;
        }

        /* 提醒小浮层（防沉迷toast） */
        .reminder-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #bd5a3c;
            color: #fff5d2;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.3rem;
            box-shadow: 0 0 30px #ff7f4f;
            border: 2px solid #ffc285;
            z-index: 9999;
            animation: popIn 0.4s;
            display: none;
        }
        .reminder-toast.show { display: block; }
        @keyframes popIn { 0% { transform: scale(0.2); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .sub-footer {
            max-width: 1400px;
            margin: 3rem auto 0;
            color: #679c99;
            font-size: 0.9rem;
            text-align: center;
            border-top: 1px dashed #3b7970;
            padding-top: 1.8rem;
        }
    </style>
</head>
<body>

    <div id="reminderToast" class="reminder-toast">⏳ 萝卜芽提醒：已玩10分钟，起来活动一下～</div>

    <div class="dashboard">
        <div class="brand">
            <div class="brand-logo">🥕</div>
            <div class="brand-name">萝卜芽科技</div>
        </div>
        <div class="level-panel" id="levelPanel">
            <div><span class="level-label">你的等级</span><span class="level-value" id="levelDisplay">1</span></div>
            <div><span class="level-label">总经验</span><span id="totalExpDisplay">0</span></div>
            <div class="exp-bar"><div class="exp-fill" id="expBarFill" style="width:0%"></div></div>
            <div><span id="nextLevelExp">0/100</span></div>
        </div>
        <button class="reset-btn" id="resetDataBtn">🌱 重置成长</button>
    </div>

    <!-- 内置游戏舱 (动态显示当前游戏) -->
    <div class="game-capsule" id="gameCapsule">
        <div class="game-arena" id="gameArena">
            <div class="game-header">
                <span class="game-name-badge" id="currentGameName">🏠 萝卜大厅</span>
                <span class="exp-gain">⚡ 游玩 +1 exp</span>
            </div>
            <div class="game-play-area" id="gamePlayArea">
                🥕 点击下方卡片选择内置游戏
            </div>
            <div class="action-buttons">
                <button class="action-btn" id="playGameBtn">🎮 玩一次</button>
                <button class="action-btn secondary" id="closeGameBtn">🔻 收起</button>
            </div>
        </div>
    </div>

    <!-- 游戏网格容器 (1000卡片) -->
    <div class="game-grid" id="gameGrid"></div>

    <div class="sub-footer">🥕 萝卜芽 · 内置1000+小游戏 · 纯本地/防沉迷/等级缓存</div>

    <script>
        (function() {
            // ---------- 配置 ----------
            const GAME_COUNT = 1000;                // 内置1000个游戏，全部写在代码里！
            const REMINDER_INTERVAL = 10 * 60 * 1000; // 10分钟
            const EXP_PER_LEVEL = 100;               

            // ---------- 1. 生成1000个游戏数据 (完全内置，名称/玩法/表情) ----------
            const games = [];
            const gameActions = [
                "点击屏幕", "滑动手指", "快速连点", "左右倾斜", "拖拽合并", "旋转转盘", "接住掉落", "弹跳碰撞",
                "躲避障碍", "射击目标", "匹配图案", "记忆顺序", "数数有几个", "画出轨迹", "吹气(模拟)", "按节奏点",
                "拼图复原", "找出不同", "迷宫寻路", "堆叠方块", "颜色分辨", "数字计算", "单词拼写", "摇晃手机",
                "猜拳对决", "轮盘赌运", "翻牌配对", "打地鼠", "钓鱼", "赛车漂移", "跳跃收集", "打砖块"
            ];
            const gameObjects = [
                "🍎", "🤖", "🐱", "🐶", "🚗", "✈️", "🏀", "🎮", "⌨️", "☕", "🍕", "🌈", "⭐", "💎", "🧸",
                "🎈", "🧩", "🎨", "🔮", "🧲", "🧪", "🕹️", "📱", "💻", "🖱️", "🎧", "🎤", "🎸", "🥁", "🎺",
                "🏆", "🥇", "🌍", "🌋", "🗿", "👾", "🤖", "👻", "🙈", "🐸", "🐙", "🦄", "🐲", "🦋", "🌵"
            ];

            for (let i = 0; i < GAME_COUNT; i++) {
                const action = gameActions[i % gameActions.length];
                const obj = gameObjects[i % gameObjects.length];
                // 构造有趣游戏名
                const name = `${obj} ${action} ${Math.floor(i/10)+1}`;
                // 游戏描述(显示在游戏区)
                const description = `【${name}】\n${action}${obj}，赢取萝卜积分！`;
                // 用简单的数学游戏/互动 (随机)
                const emoji = gameObjects[(i*3) % gameObjects.length];
                
                games.push({
                    id: i,
                    name: name.length > 18 ? name.slice(0,16)+'…' : name,
                    fullDesc: description,
                    emoji: emoji,
                    // 每个游戏对应一个小玩法 (随机生成数字/趣味)
                    play: function() { 
                        // 每个游戏返回一个趣味结果 (内置玩法)
                        const outcomes = [
                            "✨ 你获得了 5 个萝卜！", "🎉 完美连击 +1", "⭐ 发现隐藏宝藏", "💥 炸弹！归零", 
                            "🍀 幸运星 +3", "🎯 精确命中", "🌈 彩虹桥出现", "🍄 力量提升",
                            "⚡ 速度暴涨", "💎 收集钻石 x2", "🧩 拼图完成一块", "🎲 掷出 6 点"
                        ];
                        return outcomes[Math.floor(Math.random() * outcomes.length)];
                    }
                });
            }

            // ---------- 2. 本地存储 经验 ----------
            let expData = { byGame: {}, totalExp: 0 };

            function loadExp() {
                const stored = localStorage.getItem('luobo_internal_1000');
                if (stored) {
                    try {
                        const p = JSON.parse(stored);
                        expData.byGame = p.byGame || {};
                        expData.totalExp = p.totalExp || 0;
                        for (let i = 0; i < games.length; i++) {
                            if (expData.byGame[i] === undefined) expData.byGame[i] = 0;
                        }
                    } catch (e) { resetExp(); }
                } else { resetExp(); }
            }
            function resetExp() {
                expData.byGame = {};
                for (let i = 0; i < games.length; i++) expData.byGame[i] = 0;
                expData.totalExp = 0;
                localStorage.setItem('luobo_internal_1000', JSON.stringify(expData));
            }
            function saveExp() {
                localStorage.setItem('luobo_internal_1000', JSON.stringify(expData));
            }
            loadExp();

            // ---------- 等级UI ----------
            function getLevel(total) { return Math.floor(total / EXP_PER_LEVEL) + 1; }
            function updateLevelUI() {
                const total = expData.totalExp;
                const level = getLevel(total);
                const nextTotal = level * EXP_PER_LEVEL;
                const prevTotal = (level-1) * EXP_PER_LEVEL;
                const percent = ((total - prevTotal) / (nextTotal - prevTotal)) * 100;
                document.getElementById('levelDisplay').innerText = level;
                document.getElementById('totalExpDisplay').innerText = total;
                document.getElementById('expBarFill').style.width = percent + '%';
                document.getElementById('nextLevelExp').innerText = `${total} / ${nextTotal}`;
            }

            // ---------- 渲染1000卡片 ----------
            const grid = document.getElementById('gameGrid');
            const gameCapsule = document.getElementById('gameCapsule');
            const gamePlayArea = document.getElementById('gamePlayArea');
            const currentGameNameSpan = document.getElementById('currentGameName');

            let currentGameId = null;
            let currentGame = null;

            function renderGrid() {
                const fragment = document.createDocumentFragment();
                for (let game of games) {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.dataset.id = game.id;
                    card.dataset.name = game.name;

                    const expCount = expData.byGame[game.id] || 0;
                    card.innerHTML = `
                        <div class="game-emoji">${game.emoji}</div>
                        <div class="game-title" title="${game.name}">${game.name}</div>
                        <div class="exp-display"><i>⚡</i> <span class="exp-number">${expCount}</span> 次</div>
                    `;
                    fragment.appendChild(card);
                }
                grid.appendChild(fragment);
                updateLevelUI();
            }

            function updateCardExp(id, newExp) {
                const card = document.querySelector(`.game-card[data-id="${id}"]`);
                if (card) {
                    const span = card.querySelector('.exp-number');
                    if (span) span.innerText = newExp;
                }
            }

            // 卡片点击: 展示游戏到舱内，不自动增加经验 (需要点击“玩一次”)
            grid.addEventListener('click', (e) => {
                const card = e.target.closest('.game-card');
                if (!card) return;
                const id = parseInt(card.dataset.id);
                const game = games.find(g => g.id === id);
                if (!game) return;

                currentGameId = id;
                currentGame = game;
                currentGameNameSpan.innerText = game.name;
                gamePlayArea.innerText = `🥕 游戏: ${game.fullDesc || game.name}\n点击下方按钮体验`;
                // 展开游戏舱 (确保可见)
                gameCapsule.style.display = 'block';
            });

            // 玩一次按钮
            document.getElementById('playGameBtn').addEventListener('click', () => {
                if (currentGameId === null || !currentGame) {
                    gamePlayArea.innerText = '请先从网格中选择一个游戏～';
                    return;
                }
                // 增加经验
                expData.byGame[currentGameId] = (expData.byGame[currentGameId] || 0) + 1;
                expData.totalExp += 1;
                saveExp();

                // 更新卡片上数字
                updateCardExp(currentGameId, expData.byGame[currentGameId]);
                // 更新等级
                updateLevelUI();

                // 调用游戏内置玩法获得趣味反馈
                const playResult = currentGame.play ? currentGame.play() : '🎮  +1 exp';
                // 显示到游戏区
                gamePlayArea.innerText = `🎲  ${playResult}\n\n(继续点击“玩一次”可再玩)`;
            });

            // 关闭按钮(收起)
            document.getElementById('closeGameBtn').addEventListener('click', () => {
                gameCapsule.style.display = 'none';
                currentGameId = null;
                currentGame = null;
            });

            // ---------- 重置 ----------
            document.getElementById('resetDataBtn').addEventListener('click', () => {
                if (confirm('重置所有游戏经验和等级？')) {
                    resetExp();
                    loadExp();  // 重新加载空数据
                    // 刷新所有卡片上的数字
                    for (let game of games) {
                        const card = document.querySelector(`.game-card[data-id="${game.id}"]`);
                        if (card) {
                            const span = card.querySelector('.exp-number');
                            if (span) span.innerText = '0';
                        }
                    }
                    updateLevelUI();
                    gamePlayArea.innerText = '🥕 数据已重置。选择卡片开始吧';
                }
            });

            // ---------- 防沉迷提醒 (10分钟) ----------
            const toast = document.getElementById('reminderToast');
            function showReminder() {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 4000);
            }
            setInterval(showReminder, REMINDER_INTERVAL);

            // 初始化
            renderGrid();
            updateLevelUI();
            // 默认隐藏游戏舱? 保留但为空
            gameCapsule.style.display = 'block'; // 让它显示但显示大厅信息

            // 清理定时器 (页面卸载)
            window.addEventListener('beforeunload', () => {
                // 清除定时器不是必须，但保持优雅
            });
        })();
    </script>
</body>
</html>
